tabspaces: 2
window:
  padding:
    x: 0
    'y': 0
  dynamic_padding: true
font:
  normal:
    family: MesloLGL Nerd Font
    style: Regular
  bold:
    family: MesloLGL Nerd Font
    style: Bold
  italic:
    family: MesloLGL Nerd Font
    style: Italic
  bold_italic:
    family: MesloLGL Nerd Font
    style: Bold Italic
  size: 14
  offset:
    x: 0
    'y': 0
  glyph_offset:
    x: 0
    'y': 0
mouse:
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
      command: open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
selection:
  save_to_clipboard: true
colors:
  primary:
    background: '0xfbf1c7'
    foreground: '0x654735'
  normal:
    black: '0x654735'
    red: '0xc14a4a'
    green: '0x6c782e'
    yellow: '0xb47109'
    blue: '0x45707a'
    magenta: '0x945e80'
    cyan: '0x4c7a5d'
    white: '0xeee0b7'
  bright:
    black: '0x654735'
    red: '0xc14a4a'
    green: '0x6c782e'
    yellow: '0xb47109'
    blue: '0x45707a'
    magenta: '0x945e80'
    cyan: '0x4c7a5d'
    white: '0xeee0b7'
theme: gruvbox_material_medium_dark
