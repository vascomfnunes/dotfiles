live_config_reload: true
env:
  TERM: screen-256color
tabspaces: 2
window:
  dynamic_padding: true
font:
  normal:
    family: MesloLGLDZ Nerd Font
    style: Regular
  bold:
    family: MesloLGLDZ Nerd Font
    style: Bold
  italic:
    family: MesloLGLDZ Nerd Font
    style: Italic
  bold_italic:
    family: MesloLGLDZ Nerd Font
    style: Bold Italic
  size: 15
  offset:
    x: 0
    'y': 0
  glyph_offset:
    x: 0
    'y': 0
mouse:
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
      command: open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true
import:
  - ~/.config/alacritty/themes/onedarkpro.yml
colors:
  primary:
    background: '#fafafa'
    foreground: '#6a6a6a'
  normal:
    black: '#6a6a6a'
    red: '#e05661'
    green: '#1da912'
    yellow: '#eea825'
    blue: '#118dc3'
    magenta: '#9a77cf'
    cyan: '#56b6c2'
    white: '#fafafa'
  bright:
    black: '#848484'
    red: '#e88189'
    green: '#25d717'
    yellow: '#f2bb54'
    blue: '#1caceb'
    magenta: '#b69ddc'
    cyan: '#7bc6d0'
    white: '#ffffff'
  cursor:
    text: CellBackground
    cursor: CellForeground
  selection:
    text: CellForeground
    background: '#bebebe'
