live_config_reload: true
env:
  TERM: screen-256color
tabspaces: 2
window:
  dynamic_padding: true
  option_as_alt: Both
font:
  normal:
    family: MesloLGLDZ Nerd Font
    style: Regular
  bold:
    family: MesloLGLDZ Nerd Font
    style: Bold
  italic:
    family: MesloLGLDZ Nerd Font
    style: Italic
  bold_italic:
    family: MesloLGLDZ Nerd Font
    style: Bold Italic
  size: 15
  offset:
    x: 0
    'y': 0
  glyph_offset:
    x: 0
    'y': 0
mouse:
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
      command: open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true
import:
  - ~/.config/alacritty/themes/onedarkpro.yml
colors:
  primary:
    background: '0xfbf1c7'
    foreground: '0x654735'
  normal:
    black: '0x654735'
    red: '0xc14a4a'
    green: '0x6c782e'
    yellow: '0xb47109'
    blue: '0x45707a'
    magenta: '0x945e80'
    cyan: '0x4c7a5d'
    white: '0xeee0b7'
  bright:
    black: '0x654735'
    red: '0xc14a4a'
    green: '0x6c782e'
    yellow: '0xb47109'
    blue: '0x45707a'
    magenta: '0x945e80'
    cyan: '0x4c7a5d'
    white: '0xeee0b7'
  cursor:
    text: CellBackground
    cursor: CellForeground
  selection:
    text: CellForeground
    background: '#5c6370'
