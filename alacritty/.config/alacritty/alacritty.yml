live_config_reload: true
env:
  TERM: alacritty
tabspaces: 2
window:
  dynamic_padding: true
font:
  normal:
    family: MesloLGLDZ Nerd Font
    style: Regular
  bold:
    family: MesloLGLDZ Nerd Font
    style: Bold
  italic:
    family: MesloLGLDZ Nerd Font
    style: Italic
  bold_italic:
    family: MesloLGLDZ Nerd Font
    style: Bold Italic
  size: 15
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
mouse:
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
      command: open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true
colors:
  primary:
    background: '0x282828'
    foreground: '0xd4be98'
  normal:
    black: '0x3c3836'
    red: '0xea6962'
    green: '0xa9b665'
    yellow: '0xd8a657'
    blue: '0x7daea3'
    magenta: '0xd3869b'
    cyan: '0x89b482'
    white: '0xd4be98'
  bright:
    black: '0x3c3836'
    red: '0xea6962'
    green: '0xa9b665'
    yellow: '0xd8a657'
    blue: '0x7daea3'
    magenta: '0xd3869b'
    cyan: '0x89b482'
    white: '0xd4be98'
theme: Monokai-Pro
