live_config_reload: true
env:
  TERM: xterm-256color
tabspaces: 2
window:
  padding:
    x: 8
    'y': 8
  dynamic_padding: false
font:
  normal:
    family: MesloLGL Nerd Font
    style: Regular
  bold:
    family: MesloLGL Nerd Font
    style: Bold
  italic:
    family: MesloLGL Nerd Font
    style: Italic
  bold_italic:
    family: MesloLGL Nerd Font
    style: Bold Italic
  size: 14
  offset:
    x: 0
    'y': 0
  glyph_offset:
    x: 0
    'y': 0
mouse:
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
      command: open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
selection:
  save_to_clipboard: true
key_bindings:
  - key: Key1
    mods: Command
    chars: "\x021"
  - key: Key2
    mods: Command
    chars: "\x022"
  - key: Key3
    mods: Command
    chars: "\x023"
  - key: Key4
    mods: Command
    chars: "\x024"
  - key: Key5
    mods: Command
    chars: "\x025"
  - key: Key6
    mods: Command
    chars: "\x026"
  - key: Key7
    mods: Command
    chars: "\x027"
  - key: Key8
    mods: Command
    chars: "\x028"
  - key: Key9
    mods: Command
    chars: "\x029"
  - key: Comma
    mods: Command
    chars: "\x02,"
  - key: T
    mods: Command
    chars: "\x02c"
  - key: W
    mods: Command
    chars: "\x02x"
  - key: Z
    mods: Command
    chars: "\x02z"
colors:
  primary:
    background: '0x282828'
    foreground: '0xd4be98'
  normal:
    black: '0x3c3836'
    red: '0xea6962'
    green: '0xa9b665'
    yellow: '0xd8a657'
    blue: '0x7daea3'
    magenta: '0xd3869b'
    cyan: '0x89b482'
    white: '0xd4be98'
  bright:
    black: '0x3c3836'
    red: '0xea6962'
    green: '0xa9b665'
    yellow: '0xd8a657'
    blue: '0x7daea3'
    magenta: '0xd3869b'
    cyan: '0x89b482'
    white: '0xd4be98'
theme: gruvbox_material_medium_dark
