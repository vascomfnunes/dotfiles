live_config_reload: true
env:
  TERM: screen-256color
tabspaces: 2
window:
  dynamic_padding: true
font:
  normal:
    family: MesloLGLDZ Nerd Font
    style: Regular
  bold:
    family: MesloLGLDZ Nerd Font
    style: Bold
  italic:
    family: MesloLGLDZ Nerd Font
    style: Italic
  bold_italic:
    family: MesloLGLDZ Nerd Font
    style: Bold Italic
  size: 15
  offset:
    x: 0
    'y': 0
  glyph_offset:
    x: 0
    'y': 0
mouse:
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
      command: open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true
import:
  - ~/.config/alacritty/themes/onedarkpro.yml
colors:
  primary:
    background: '#282c34'
    foreground: '#abb2bf'
  normal:
    black: '#282c34'
    red: '#e06c75'
    green: '#98c379'
    yellow: '#e5c07b'
    blue: '#61afef'
    magenta: '#c678dd'
    cyan: '#56b6c2'
    white: '#abb2bf'
  bright:
    black: '#3e4451'
    red: '#e9969d'
    green: '#b3d39c'
    yellow: '#edd4a6'
    blue: '#8fc6f4'
    magenta: '#d7a1e7'
    cyan: '#7bc6d0'
    white: '#c8cdd5'
  cursor:
    text: CellBackground
    cursor: CellForeground
  selection:
    text: CellForeground
    background: '#5c6370'
