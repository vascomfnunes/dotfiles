tabspaces: 2
window:
  padding:
    x: 0
    y: 0
  dynamic_padding: true
font:
  normal:
    family: "MesloLGL Nerd Font"
    style: Regular
  bold:
    family: "MesloLGL Nerd Font"
    style: Bold
  italic:
    family: "MesloLGL Nerd Font"
    style: Italic
  bold_italic:
    family: "MesloLGL Nerd Font"
    style: Bold Italic
  size: 14
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
mouse:
  hide_when_typing: true
hints:
  enabled:
    - regex: "(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\0-\x1F\x7F-\x9F<>\"\\s{-}\\^⟨⟩`]+"
      command: open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
selection:
  save_to_clipboard: true
