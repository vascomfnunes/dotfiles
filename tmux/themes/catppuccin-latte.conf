# Catppuccin Latte (light) status bar and pane colors.

set -g @radio_fg "#8839ef"
set -g @battery_charging_fg "#179299"
set -g @battery_high_fg "#40a02b"
set -g @battery_medium_fg "#df8e1d"
set -g @battery_low_fg "#d20f39"
set -g status-style "fg=#4c4f69,bg=#eff1f5"
set -g window-status-style "fg=#6c6f85,bg=#eff1f5"
set -g window-status-current-style "fg=#eff1f5,bg=#1e66f5,bold"
set -g pane-border-style "fg=#ccd0da"
set -g pane-active-border-style "fg=#1e66f5"
set -g message-style "fg=#eff1f5,bg=#df8e1d"
set -g mode-style "fg=#eff1f5,bg=#df8e1d"
