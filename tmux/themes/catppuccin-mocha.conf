# Catppuccin Mocha (dark) status bar and pane colors.

set -g @radio_fg "#cba6f7"
set -g @battery_charging_fg "#94e2d5"
set -g @battery_high_fg "#a6e3a1"
set -g @battery_medium_fg "#f9e2af"
set -g @battery_low_fg "#f38ba8"
set -g status-style "fg=#cdd6f4,bg=#1e1e2e"
set -g window-status-style "fg=#a6adc8,bg=#1e1e2e"
set -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "fg=#1e1e2e,bg=#f9e2af"
set -g mode-style "fg=#1e1e2e,bg=#f9e2af"
