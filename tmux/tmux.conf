##### Terminal support

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB:hyperlinks"

# Preserve the outer terminal identity when clients attach. Yazi uses these
# variables to select Ghostty's image protocol while running inside tmux.
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM TERM_PROGRAM"

# Let escape sequences from programs inside tmux (e.g. image protocols) reach
# the outer terminal.
set -g allow-passthrough on


##### Prefix and session behavior

unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a last-window

# Keep escape-based key sequences responsive in Vim and shells.
set -s escape-time 0
set -g history-limit 100000
set -g mouse on
set -g focus-events on

# Start windows and panes at 1 so tmux indices match keyboard number keys.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on


##### Status bar

set -g status-position top
set -g status 2
set -g status-interval 10
set -g status-left-length 40
set -g status-right-length 120
set -g status-left " #S "
set -g status-right "#[fg=#{@radio_fg}]#(~/.local/bin/tmux-pyradio-status)#[default]#(~/.local/bin/tmux-weather-status)#(~/.local/bin/tmux-battery-status '#{@battery_charging_fg}' '#{@battery_high_fg}' '#{@battery_medium_fg}' '#{@battery_low_fg}') %H:%M  %d %b "
# Keep the second status line empty so the top toolbar has breathing room.
set -g status-format[1] " "


##### Radio cover art

# Prefix + m pops up cover art for the song playing in pyradio.
# Prefix + M opens it as a persistent pane above the current one (run it from
# the pyradio window); q closes it.
bind m display-popup -E -w 46 -h 26 "~/.local/bin/tmux-pyradio-art"
bind M split-window -vb -l 15 "~/.local/bin/tmux-pyradio-art"


##### Popup tools

# Open tools in the active pane's directory without taking over its window.
bind y display-popup -E -d "#{pane_current_path}" -w 90% -h 90% -T "Yazi" "yazi"
bind b display-popup -E -d "#{pane_current_path}" -w 90% -h 90% -T "btop" "~/.local/bin/btop-themed"
bind S display-popup -E -d "#{pane_current_path}" -w 90% -h 90% -T "Cheatsheets" "~/.local/bin/tmux-cheatsheet"


##### Config reload

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"


##### Windows and panes

# Prefix + v creates a vertical split; prefix + s creates a horizontal split.
# New windows and panes keep the current pane's working directory.
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind j select-pane -D
bind k select-pane -U

bind -r h previous-window
bind -r l next-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### Neovim pane integration

# Route Ctrl/Alt navigation into Vim-like programs, otherwise move tmux panes.
# This pairs with nvim/lua/splits.lua for seamless editor/tmux navigation.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind C-l send-keys C-l


##### Copy mode

set -g mode-keys vi
# Forward copies to the system clipboard via OSC 52 (supported by Ghostty).
set -s set-clipboard on
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


##### Theme

# Follow the macOS appearance setting and apply matching Catppuccin colors.
# Palettes live in themes/, symlinked to ~/.config/tmux/themes by install.sh.
if-shell 'defaults read -g AppleInterfaceStyle >/dev/null 2>&1' {
  source-file ~/.config/tmux/themes/catppuccin-mocha.conf
} {
  source-file ~/.config/tmux/themes/catppuccin-latte.conf
}
