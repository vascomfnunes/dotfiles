##### Terminal support

set -g default-terminal "tmux-256color"
set -s terminal-overrides "linux*:AX@,*:RGB"


##### Prefix and session behavior

unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a last-window

# Keep escape-based key sequences responsive in Vim and shells.
set -s escape-time 0
set -g history-limit 10000
set -g mouse on
set -g focus-events on

# Start windows and panes at 1 so tmux indices match keyboard number keys.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


##### Status bar

set -g status-position top
set -g status 2
set -g status-interval 10
set -g status-left-length 40
set -g status-right-length 120
set -g status-left " #S "
set -g status-right "#[fg=#{@radio_fg}]#(~/.local/bin/tmux-pyradio-status)#[default]#(~/.local/bin/tmux-weather-status)#(~/.local/bin/tmux-battery-status '#{@battery_charging_fg}' '#{@battery_high_fg}' '#{@battery_medium_fg}' '#{@battery_low_fg}') %H:%M  %d %b "
# Keep the second status line empty so the top toolbar has breathing room.
set -g status-format[1] " "


##### Config reload

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"


##### Windows and panes

# Prefix + v creates a vertical split; prefix + s creates a horizontal split.
unbind |
unbind -
unbind '"'
unbind %
bind v split-window -h
bind s split-window -v

bind j select-pane -D
bind k select-pane -U

bind -r h previous-window
bind -r l next-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### Neovim pane integration

# Route Ctrl/Alt navigation into Vim-like programs, otherwise move tmux panes.
# This pairs with smart-splits.nvim for seamless editor/tmux navigation.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind C-l send-keys C-l


##### Copy mode

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


##### Theme

# Follow the macOS appearance setting and apply matching Catppuccin colors.
if-shell 'defaults read -g AppleInterfaceStyle >/dev/null 2>&1' {
  set -g @radio_fg "#cba6f7"
  set -g @battery_charging_fg "#94e2d5"
  set -g @battery_high_fg "#a6e3a1"
  set -g @battery_medium_fg "#f9e2af"
  set -g @battery_low_fg "#f38ba8"
  set -g status-style "fg=#cdd6f4,bg=#1e1e2e"
  set -g window-status-style "fg=#a6adc8,bg=#1e1e2e"
  set -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
  set -g pane-border-style "fg=#313244"
  set -g pane-active-border-style "fg=#89b4fa"
  set -g message-style "fg=#1e1e2e,bg=#f9e2af"
  set -g mode-style "fg=#1e1e2e,bg=#f9e2af"
} {
  set -g @radio_fg "#8839ef"
  set -g @battery_charging_fg "#179299"
  set -g @battery_high_fg "#40a02b"
  set -g @battery_medium_fg "#df8e1d"
  set -g @battery_low_fg "#d20f39"
  set -g status-style "fg=#4c4f69,bg=#eff1f5"
  set -g window-status-style "fg=#6c6f85,bg=#eff1f5"
  set -g window-status-current-style "fg=#eff1f5,bg=#1e66f5,bold"
  set -g pane-border-style "fg=#ccd0da"
  set -g pane-active-border-style "fg=#1e66f5"
  set -g message-style "fg=#eff1f5,bg=#df8e1d"
  set -g mode-style "fg=#eff1f5,bg=#df8e1d"
}
